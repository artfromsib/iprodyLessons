spring:
  datasource:
    url: jdbc:h2:mem:deliverydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_versioned_data: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082

logging:
  level:
    com.ym.payment-service: DEBUG
    org.hibernate: DEBUG
    org.springframework.transaction: DEBUG
springdoc:
  api-docs:
    path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: alpha
      tags-sorter: alpha