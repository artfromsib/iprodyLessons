spring:
  datasource:
    url: jdbc:h2:mem:deliverydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_versioned_data: false

  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual
      observation-enabled: true
    template:
      observation-enabled: true
    consumer:
      group-id: delivery-consumers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.ym.deliveryservice.integration.order.dto.request.OrderPaidRequestMessage

server:
  port: 8082

logging:
  level:
    com.ym.payment-service: DEBUG
    org.hibernate: DEBUG
    org.springframework.transaction: DEBUG
springdoc:
  api-docs:
    path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: alpha
      tags-sorter: alpha

resilience4j:
  circuitbreaker:
    instances:
      shipmentControllerCircuitBreaker:
        recordExceptions:
          - feign.FeignException.InternalServerError
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.dao.DataAccessException
        ignoreExceptions:
          - java.lang.RuntimeException
          - java.lang.IllegalArgumentException
          - com.ym.deliveryservice.interfaces.exception.ShipmentNotFoundException

        failureRateThreshold: 50
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s
kafka:
  service:
    order:
      order-creation-status-topic: order.creation.status